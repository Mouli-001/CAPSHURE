<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>CAPSHURE</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <div class="logo-row">
        <img src="assets/capshure-logo.jpg" alt="CAPSHURE logo" class="logo" />
      </div>
      <h1>CAPSHURE</h1>
      <label class="switch-row">
        <span>Protection</span>
        <label class="switch">
          <input type="checkbox" id="toggle-detector" />
          <span class="slider"></span>
        </label>
      </label>
      <p class="status" id="status-text">Loading...</p>
      <p class="hint">
        Open any page. CAPSHURE will scan links automatically.
      </p>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
